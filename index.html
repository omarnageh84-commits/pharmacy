<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvlBUTo7Z4iFMHkH0cDGRsba99RlGiFjtGiLsO9MANiIIn_coI7xndvEht7LropZIHXA5SUde0hQo2/pub?output=csv';
    let allData = [];

    Papa.parse(csvUrl, {
        download: true, header: true,
        complete: function(results) {
            allData = results.data;
            renderData(allData);
        }
    });

    function renderData(data) {
        const container = document.getElementById('cards-zone');
        container.innerHTML = '';
        
        data.forEach(item => {
            if (!item.الاسم) return;

            // هنا بنحل مشكلة الـ undefined
            // بنحط أكتر من احتمال لاسم العمود عشان نضمن إنه يشتغل
            const maho = item['ماهو / سببه'] || item['ماهو'] || '---';
            const wati = item['الواطي'] || item['الوطي'] || '---';

            container.innerHTML += `
                <div class="card">
                    <h3>${item.الاسم}</h3>
                    <p><span class="label">ماهو / سببه:</span> ${maho}</p>
                    <p><span class="label">التحليل:</span> ${item.التحليل || '---'}</p>
                    <p><span class="label">العلاج:</span> ${item.العلاج || '---'}</p>
                    <p><span class="label">معدي:</span> ${item.معدي || '---'}</p>
                    <p><span class="label">الطبيعي:</span> ${item.الطبيعي || '---'}</p>
                    <p><span class="label">العالي:</span> ${item.العالي || '---'}</p>
                    <p><span class="label">الواطي:</span> ${wati}</p>
                    ${item['رابط الصور'] ? `<img src="${item['رابط الصور']}" alt="صورة المرض">` : ''}
                </div>
            `;
        });
    }

    function filterData() {
        let val = document.getElementById("searchInput").value.toUpperCase();
        renderData(allData.filter(i => i.الاسم && i.الاسم.toUpperCase().includes(val)));
    }
</script>
