<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>علم ينتفع به - Omar 💊</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --main-color: #2e7d32; --bg-color: #f8fdf8; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background: var(--bg-color); }
        h1 { text-align: center; color: var(--main-color); margin-bottom: 30px; }
        
        #searchInput { width: 90%; max-width: 500px; display: block; margin: 20px auto; padding: 15px; border: 2px solid var(--main-color); border-radius: 25px; outline: none; text-align: center; }
        
        /* تنسيق الشبكة: 2 كارت في السطر للكمبيوتر */
        #cards-zone { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            max-width: 900px; 
            margin: 0 auto; 
        }
        
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            border-top: 8px solid var(--main-color); 
            display: flex; 
            flex-direction: column;
        }
        
        h3 { color: var(--main-color); margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        p { margin: 8px 0; line-height: 1.5; color: #333; }
        .label { font-weight: bold; color: var(--main-color); }
        
        /* تحجيم الصورة */
        .card img { 
            width: 100%; 
            max-height: 180px; 
            object-fit: cover; 
            border-radius: 8px; 
            margin-bottom: 15px; 
        }

        /* تنسيق الموبايل: كارت واحد تحت بعضه */
        @media (max-width: 600px) {
            #cards-zone { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>علم ينتفع به - Omar 💊</h1>
    <input type="text" id="searchInput" onkeyup="filterData()" placeholder="🔍 ابحث باسم المرض...">
    <div id="cards-zone"></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvlBUTo7Z4iFMHkH0cDGRsba99RlGiFjtGiLsO9MANiIIn_coI7xndvEht7LropZIHXA5SUde0hQo2/pub?output=csv';
    let allData = [];

    Papa.parse(csvUrl, {
        download: true, header: true,
        complete: function(results) {
            allData = results.data;
            renderData(allData);
        }
    });

    function renderData(data) {
        const container = document.getElementById('cards-zone');
        container.innerHTML = '';
        const groups = {};

        data.forEach(item => {
            if (!item.الاسم) return;
            if (!groups[item.الاسم]) groups[item.الاسم] = item;
        });

        Object.values(groups).forEach(item => {
            container.innerHTML += `
                <div class="card">
                    ${item['رابط الصور'] ? `<img src="${item['رابط الصور']}" alt="صورة المرض">` : ''}
                    <h3>${item.الاسم}</h3>
                    <p><span class="label">ماهو:</span> ${item.ماهو || '---'}</p>
                    <p><span class="label">التحليل:</span> ${item.التحليل || '---'}</p>
                    <p><span class="label">العلاج:</span> ${item.العلاج || '---'}</p>
                    <p><span class="label">معدي:</span> ${item.معدي || '---'}</p>
                </div>
            `;
        });
    }

    function filterData() {
        let val = document.getElementById("searchInput").value.toUpperCase();
        renderData(allData.filter(i => i.الاسم && i.الاسم.toUpperCase().includes(val)));
    }
</script>
</body>
</html>
