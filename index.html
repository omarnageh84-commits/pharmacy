<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>علم ينتفع به - OMAR 💊</title>
    <style>
        :root { --bg-color: #f0f4f0; --main-color: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; padding: 10px; background: var(--bg-color); margin: 0; }
        
        /* توسيع خانة البحث للكمبيوتر */
        #searchInput { 
            width: 100%; 
            max-width: 800px; 
            display: block; 
            margin: 20px auto; 
            padding: 15px; 
            border: 2px solid var(--main-color); 
            border-radius: 30px; 
            outline: none; 
            text-align: center; 
            font-size: 18px;
        }
        
        #cards-zone { 
            display: grid; 
            gap: 20px; 
            padding: 10px; 
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        @media (max-width: 450px) { #cards-zone { grid-template-columns: 1fr; } }
        
        .card { background: white; padding: 20px; border-radius: 20px; border-right: 8px solid var(--main-color); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        h3 { color: var(--main-color); margin: 0 0 10px 0; font-size: 1.4rem; }
        .label { font-weight: bold; color: #555; display: block; margin-top: 10px; font-size: 1rem; }
        
        ol { margin: 5px 0; padding-right: 20px; color: #2e7d32; font-size: 0.95rem; font-weight: 600; }
        li { margin-bottom: 5px; }
        
        .values-line { font-size: 0.9rem; background: #f1f8e9; padding: 8px; border-radius: 8px; margin-top: 15px; color: #333; font-weight: bold; text-align: center; }
        
        /* ضبط عرض الصورة لتظهر كاملة */
        .card img { 
            width: 100%; 
            height: auto; 
            max-height: 250px; 
            object-fit: contain; /* تضمن ظهور الصورة كاملة دون قص */
            border-radius: 12px; 
            margin-top: 15px; 
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

    <input type="text" id="searchInput" onkeyup="filterData()" placeholder="🔍 ابحث...">
    <div id="cards-zone"></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvlBUTo7Z4iFMHkH0cDGRsba99RlGiFjtGiLsO9MANiIIn_coI7xndvEht7LropZIHXA5SUde0hQo2/pub?output=csv';
    let allData = [];

    Papa.parse(csvUrl, {
        download: true, header: true,
        complete: function(results) {
            let currentName = "";
            allData = results.data.map(row => {
                if (row.الاسم && row.الاسم.trim() !== "") currentName = row.الاسم;
                return { ...row, الاسم: currentName };
            });
            renderData(allData);
        }
    });

    function renderData(data) {
        const container = document.getElementById('cards-zone');
        container.innerHTML = '';
        const grouped = {};
        data.forEach(row => {
            if (!row.الاسم) return;
            if (!grouped[row.الاسم]) grouped[row.الاسم] = { ...row, العلاج: [] };
            if (row.العلاج && row.العلاج.trim() !== "") grouped[row.الاسم].العلاج.push(row.العلاج);
        });

        Object.values(grouped).forEach(item => {
            const treatments = item.العلاج.map(t => `<li>${t}</li>`).join('');
            
            container.innerHTML += `
                <div class="card">
                    <h3>${item.الاسم}</h3>
                    <span class="label">ماهو / سببه:</span> <div>${item['ماهو / سببه'] || '---'}</div>
                    <span class="label">التحليل:</span> <div>${item.التحليل || '---'}</div>
                    <span class="label">العلاج:</span> <ol>${treatments}</ol>
                    <span class="label">معدي:</span> ${item.معدي || '---'}
                    <div class="values-line">طبيعي: ${item.الطبيعي || '-'} | عالي: ${item.العالي || '-'} | واطي: ${item['الواطي'] || '-'}</div>
                    ${item['رابط الصور'] && item['رابط الصور'] !== 'رابط' ? `<img src="${item['رابط الصور']}" alt="صورة">` : ''}
                </div>
            `;
        });
    }

    function filterData() {
        let val = document.getElementById("searchInput").value.toUpperCase();
        renderData(allData.filter(item => JSON.stringify(item).toUpperCase().includes(val)));
    }
</script>
</body>
</html>
