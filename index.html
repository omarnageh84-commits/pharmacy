<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>علم ينتفع به - OMAR 💊</title>
    <style>
        :root { 
            --bg-color: #f7f9fc; 
            --soft-purple: #b39ddb; 
            --apricot: #ffcc80;     
            --gold: #f57f17;        
            --teal: #4db6ac;        
            --dark-gray: #424242;   
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background: var(--bg-color); margin: 0; }

        #searchInput { width: 95%; max-width: 750px; display: block; margin: 20px auto; padding: 15px; border: 2px solid var(--soft-purple); border-radius: 20px; outline: none; text-align: center; font-size: 17px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        #cards-zone { display: grid; gap: 25px; padding: 10px; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); max-width: 1000px; margin: 0 auto; }

        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            border-right: 8px solid var(--soft-purple); 
            box-shadow: 0 6px 12px rgba(0,0,0,0.08); 
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }

        h3 { color: var(--soft-purple); margin: 0 0 15px 0; font-size: 1.5rem; }

        .label { font-weight: bold; color: var(--teal); display: block; margin-top: 15px; font-size: 0.95rem; text-transform: uppercase; }

        .text-block { 
            white-space: pre-line; 
            color: var(--dark-gray); 
            font-weight: 500; 
            margin-top: 5px; 
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .label-treatment { color: var(--apricot); font-weight: bold; }

        .values-line { 
            font-size: 0.85rem; 
            background: #fff9f4; 
            padding: 12px; 
            border-radius: 12px; 
            margin-top: 20px; 
            color: var(--gold); 
            font-weight: bold; 
            text-align: center; 
            border: 1px solid var(--apricot); 
            display: flex; 
            justify-content: space-around;
        }

        .card img { width: 100%; height: auto; max-height: 250px; object-fit: contain; border-radius: 15px; margin-top: 15px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
