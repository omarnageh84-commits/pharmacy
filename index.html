<script>
    Papa.parse(csvUrl, {
        download: true, header: true,
        complete: function(results) {
            const container = document.getElementById('cards-zone');
            container.innerHTML = ''; 

            // مصفوفة عشان نجمع فيها الأمراض
            const groupedData = {};

            results.data.forEach(item => {
                if (!item.الاسم) return;

                // لو المرض مش موجود، نضيفه، ولو موجود نجمع عليه العلاج
                if (!groupedData[item.الاسم]) {
                    groupedData[item.الاسم] = { ...item };
                } else {
                    groupedData[item.الاسم].العلاج += "، " + item.العلاج;
                }
            });

            // نعرض الكروت المجمعة
            Object.values(groupedData).forEach(item => {
                container.innerHTML += `
                    <div class="card">
                        <h3>${item.الاسم}</h3>
                        <p><strong>ماهو:</strong> ${item.ماهو}</p>
                        <p><strong>التحليل:</strong> ${item.التحليل}</p>
                        <p><strong>العلاج:</strong> ${item.العلاج}</p>
                        <div class="badge-container">
                            <span class="badge">معدي: ${item.معدي}</span>
                            <span class="badge">الطبيعي: ${item.الطبيعي}</span>
                        </div>
                        <div style="margin-top:15px;">
                            <img src="${item.رابط_الصور}" style="width:100%; border-radius:10px;" onerror="this.style.display='none'">
                        </div>
                    </div>
                `;
            });
        }
    });
</script>
