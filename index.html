<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 10px; background: #1e1e1e; border: 1px solid #333; color: #fff; border-radius: 8px; cursor: pointer; }
        .tabs button:hover { background: #00a884; }
        .page { display: none; }
        .active { display: block; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        input { width: 90%; padding: 10px; margin: 5px 0; background: #333; border: 1px solid #555; color: #fff; border-radius: 5px; }
        button.save { background: #00a884; border: none; padding: 10px; color: #fff; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        h3 { color: #00a884; margin-top: 0; }
        a { color: #00a884; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="tabs">
        <button onclick="showPage('pharmacy')">الصيدلية</button>
        <button onclick="showPage('personal')">الخاص</button>
        <button onclick="showPage('database')">القاعدة</button>
    </div>

    <div id="pharmacy" class="page active">
        <!-- كارت التسجيل -->
        <div class="card">
            <h3>تسجيل اليومية</h3>
            <input type="number" id="sales" placeholder="المبيعات">
            <input type="number" id="expenses" placeholder="المصاريف">
            <button class="save" onclick="saveData()">حفظ البيانات 💾</button>
        </div>

        <!-- كارت الملخص -->
        <div class="card">
            <h3>ملخص اليوم</h3>
            <p id="status">جاري تحميل البيانات...</p>
        </div>

        <!-- كارت الدفع والتواصل -->
        <div class="card">
            <h3>وسائل الدفع والتواصل</h3>
            <p>💰 فودافون كاش: 01099478956</p>
            <p>📱 إنستا باي: 01007036085</p>
            <hr style="border: 0; border-top: 1px solid #333;">
            <p>للطلبات والاستفسارات:</p>
            <a href="https://wa.me/201007036085" target="_blank">💬 واتساب: 01007036085</a>
        </div>
    </div>

    <div id="personal" class="page">
        <div class="card"><h3>الديون والملاحظات</h3><p>قريباً...</p></div>
    </div>

    <div id="database" class="page">
        <div class="card"><h3>بيانات الموظفين</h3><p>جاري التحميل...</p></div>
    </div>

    <script>
        const SCRIPT_URL = "ضع_رابط_الـ_Web_App_هنا"; 

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function updateSummary() {
            fetch(SCRIPT_URL)
            .then(response => response.json())
            .then(data => {
                document.getElementById('status').innerHTML = 
                    `المبيعات: ${data.sales} ج.م <br> المصروفات: ${data.expenses} ج.م`;
            })
            .catch(() => document.getElementById('status').innerText = "حدث خطأ في تحميل البيانات");
        }

        function saveData() {
            const data = {
                sales: document.getElementById('sales').value,
                expenses: document.getElementById('expenses').value
            };
            
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => {
                alert("تم الحفظ يا دكتور! ✅");
                updateSummary();
            });
        }

        window.onload = updateSummary;
    </script>
</body>
</html>
