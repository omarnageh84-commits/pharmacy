<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>علم ينتفع به - OMAR 💊</title>
    <style>
        :root { --bg-color: #f8fdf8; --main-color: #2e7d32; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 10px; background: var(--bg-color); margin: 0; }
        #searchInput { width: 90%; max-width: 500px; display: block; margin: 15px auto; padding: 12px; border: 2px solid var(--main-color); border-radius: 25px; outline: none; text-align: center; font-size: 16px; }
        #cards-zone { display: grid; gap: 15px; padding: 10px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); max-width: 900px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 20px; border-top: 8px solid var(--main-color); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h3 { color: var(--main-color); margin: 0 0 15px 0; border-bottom: 2px solid #eee; padding-bottom: 10px; font-size: 1.4rem; }
        .label { font-weight: bold; color: var(--main-color); display: block; margin-top: 10px; }
        .card img { width: 100%; height: auto; max-height: 250px; object-fit: cover; border-radius: 12px; margin-top: 15px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

    <input type="text" id="searchInput" onkeyup="filterData()" placeholder="🔍 ابحث بأي كلمة...">
    <div id="cards-zone"></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvlBUTo7Z4iFMHkH0cDGRsba99RlGiFjtGiLsO9MANiIIn_coI7xndvEht7LropZIHXA5SUde0hQo2/pub?output=csv';
    let allData = [];

    Papa.parse(csvUrl, {
        download: true, header: true,
        complete: function(results) {
            let currentName = "";
            allData = results.data.map(row => {
                if (row.الاسم && row.الاسم.trim() !== "") currentName = row.الاسم;
                return { ...row, الاسم: currentName };
            });
            renderData(allData);
        }
    });

    function renderData(data) {
        const container = document.getElementById('cards-zone');
        container.innerHTML = '';
        
        // تجميع ذكي لكل صف يخص نفس الاسم
        const grouped = {};
        data.forEach(row => {
            if (!row.الاسم) return;
            if (!grouped[row.الاسم]) grouped[row.الاسم] = { ...row, العلاج: [] };
            if (row.العلاج) grouped[row.الاسم].العلاج.push(row.العلاج);
        });

        Object.values(grouped).forEach(item => {
            container.innerHTML += `
                <div class="card">
                    <h3>${item.الاسم}</h3>
                    <span class="label">ماهو:</span> ${item['ماهو / سببه'] || '---'}
                    <span class="label">التحليل:</span> ${item.التحليل || '---'}
                    <span class="label">العلاج:</span> ${item.العلاج.join('<br>')}
                    <span class="label">معدي:</span> ${item.معدي || '---'}
                    <span class="label">طبيعي:</span> ${item.الطبيعي || '---'}
                    ${item['رابط الصور'] && item['رابط الصور'] !== 'رابط' ? `<img src="${item['رابط الصور']}" alt="صورة">` : ''}
                </div>
            `;
        });
    }

    function filterData() {
        let val = document.getElementById("searchInput").value.toUpperCase();
        renderData(allData.filter(item => JSON.stringify(item).toUpperCase().includes(val)));
    }
</script>
</body>
</html>
