<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>علم ينتفع به - OMAR 💊</title>
    <!-- PWA Manifest -->
    <link rel="manifest" href='data:application/json,{"name":"مساعد الصيدلية","short_name":"مساعد الصيدلية","start_url":"index.html","display":"standalone","background_color":"%23f0f7f4","theme_color":"%232e7d32","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/3050/3050239.png","sizes":"192x192","type":"image/png"}]}'>
    
    <style>
        :root { --bg-color: #f8fdf8; --main-color: #2e7d32; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 10px; background: var(--bg-color); margin: 0; }
        
        #searchInput { width: 90%; max-width: 500px; display: block; margin: 15px auto; padding: 12px; border: 2px solid var(--main-color); border-radius: 25px; outline: none; text-align: center; font-size: 16px; }
        
        #cards-zone { display: grid; gap: 15px; padding: 10px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); max-width: 900px; margin: 0 auto; }
        
        .card { background: white; padding: 15px; border-radius: 12px; border-top: 6px solid var(--main-color); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h3 { color: var(--main-color); margin: 0 0 10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .label { font-weight: bold; color: var(--main-color); }
        .card img { width: 100%; height: auto; max-height: 200px; object-fit: contain; border-radius: 8px; margin-top: 10px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

    <input type="text" id="searchInput" onkeyup="filterData()" placeholder="🔍 ابحث بأي كلمة...">
    <div id="cards-zone"></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvlBUTo7Z4iFMHkH0cDGRsba99RlGiFjtGiLsO9MANiIIn_coI7xndvEht7LropZIHXA5SUde0hQo2/pub?output=csv';
    let allData = [];

    Papa.parse(csvUrl, {
        download: true, header: true,
        complete: function(results) {
            allData = results.data;
            renderData(allData);
        }
    });

    function renderData(data) {
        const container = document.getElementById('cards-zone');
        container.innerHTML = '';
        data.forEach(item => {
            if (!item.الاسم) return;
            container.innerHTML += `
                <div class="card">
                    <h3>${item.الاسم}</h3>
                    <p><span class="label">ماهو:</span> ${item['ماهو / سببه'] || '---'}</p>
                    <p><span class="label">التحليل:</span> ${item.التحليل || '---'}</p>
                    <p><span class="label">العلاج:</span> ${item.العلاج || '---'}</p>
                    <p><span class="label">معدي:</span> ${item.معدي || '---'}</p>
                    <p><span class="label">طبيعي:</span> ${item.الطبيعي || '---'}</p>
                    ${item['رابط الصور'] ? `<img src="${item['رابط الصور']}" alt="صورة">` : ''}
                </div>
            `;
        });
    }

    function filterData() {
        let val = document.getElementById("searchInput").value.toUpperCase();
        
        renderData(allData.filter(item => {
            return (
                (item.الاسم && item.الاسم.toUpperCase().includes(val)) ||
                (item['ماهو / سببه'] && item['ماهو / سببه'].toUpperCase().includes(val)) ||
                (item.التحليل && item.التحليل.toUpperCase().includes(val)) ||
                (item.العلاج && item.العلاج.toUpperCase().includes(val)) ||
                (item.معدي && item.معدي.toUpperCase().includes(val)) ||
                (item.الطبيعي && item.الطبيعي.toUpperCase().includes(val))
            );
        }));
    }
</script>
</body>
</html>
