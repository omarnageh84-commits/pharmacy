<script>
    // ... (جزء Papa.parse زي ما هو)
    
    complete: function(results) {
        const container = document.getElementById('cards-zone');
        container.innerHTML = ''; 
        const groupedData = {};

        results.data.forEach(item => {
            if (!item.الاسم) return;

            // إذا كان المرض أول مرة يظهر، أنشئ له كارت
            if (!groupedData[item.الاسم]) {
                groupedData[item.الاسم] = { ...item };
            } else {
                // إذا كان موجود، ادمج البيانات الجديدة مع القديمة
                groupedData[item.الاسم].العلاج += "، " + item.العلاج;
                groupedData[item.الاسم].التحليل += "، " + item.التحليل;
                groupedData[item.الاسم].السبب += "، " + item.السبب;
            }
        });

        // عرض البيانات بعد التجميع
        Object.values(groupedData).forEach(item => {
            container.innerHTML += `
                <div class="card">
                    <h3>${item.الاسم}</h3>
                    <p><strong>التحاليل:</strong> ${item.التحليل || '---'}</p>
                    <p><strong>ماهو:</strong> ${item.ماهو || '---'}</p>
                    <p><strong>العلاج:</strong> ${item.العلاج || '---'}</p>
                    <p><a href="${item.رابط_الصور}" target="_blank">عرض الصورة</a></p>
                </div>
            `;
        });
    }
</script>
