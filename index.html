<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صيدلية د. خالد سالم</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{font-family:'Tajawal',sans-serif}
:root{--primary:#E14A4A;--bg:#F2F5F9;--navy:#1E2142;}
body{background:var(--bg)}
.no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{scrollbar-width:none}
.line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
</style>
</head>
<body class="bg-[#F2F5F9] text-[#1E293B]">
<header class="sticky top-0 z-40 bg-[#13375C] border-b border-[#2E2E5D] shadow-[0_8px_24px_rgba(0,0,0,0.12)] rounded-b-[20px]">
  <div class="max-w-[1280px] mx-auto px-4 md:px-6 h-[64px] flex items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-white text-[#13375C] flex items-center justify-center font-black text-[18px]">خ</div>
      <div><div class="font-black leading-none text-[15px] text-white">صيدلية د. خالد سالم</div></div>
    </div>
    <button id="cartBtn" class="h-11 px-4 rounded-full bg-[#0EB77F] text-white font-bold flex items-center gap-2 shadow-lg">🛒 السلة <span id="cartCount" class="bg-white text-zinc-900 px-2 rounded-full text-[11px]">0</span></button>
  </div>
</header>

<section class="max-w-[1280px] mx-auto px-4 mt-5 pb-24">
  <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
</section>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRfLEsFdxl_lZIRBBwoVI30rAhd4G82kB8Ji4bndsOW48marqrlVon7wY4yBxib94boPXm626ZO44Ts/pub?output=csv";
let SHEET_DATA=[], cart=[];

// دالة تحويل الأسعار
const toNum = v => Number(String(v).replace(/[^0-9.]/g, '')) || 0;

// دالة قراءة الشيت المحدثة
function parseSheet(csvText){
  let results = Papa.parse(csvText, { header: true, skipEmptyLines: true });
  return results.data.map(r => ({
    name: r['الاسم'] || '',
    category: r['القسم'] || '',
    priceCurrent: toNum(r['سعر العلبة']),
    priceDiscount: toNum(r['السعر بعد العرض']),
    box: r['نوع التجزئة'] || '',
    image: r['الصورة'] || 'https://via.placeholder.com/200'
  }));
}

async function loadSheet(){
  const res = await fetch(CSV_URL+'&t='+Date.now());
  const txt = await res.text();
  SHEET_DATA = parseSheet(txt);
  renderGrid();
}

function renderGrid(){
  const g = document.getElementById('grid');
  g.innerHTML = '';
  SHEET_DATA.forEach(r => {
    const div = document.createElement('div');
    div.className = 'bg-white rounded-[16px] p-3 border shadow-sm';
    div.innerHTML = `
      <img src="${r.image}" class="w-full h-32 object-contain mb-2">
      <div class="font-bold text-[13px] line-clamp-2">${r.name}</div>
      <div class="text-[14px] font-black text-[#13375C] my-2">${r.priceDiscount > 0 ? r.priceDiscount : r.priceCurrent} ج</div>
      <button onclick="addCart('${r.name}', ${r.priceDiscount > 0 ? r.priceDiscount : r.priceCurrent})" class="w-full h-9 bg-[#10B981] text-white rounded-lg text-[12px] font-bold">طلب المنتج</button>
    `;
    g.appendChild(div);
  });
}

function addCart(name, price){
  cart.push({name, price});
  document.getElementById('cartCount').textContent = cart.length;
  alert("تم إضافة " + name + " للسلة!");
}

loadSheet();
</script>
</body>
</html>
