<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>علم ينتفع به - OMAR 💊</title>
    <style>
        :root { --bg-color: #f7f9f7; --border-color: #6a5acd; } /* اللون البنفسجي للفريم */
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: var(--bg-color); margin: 0; }
        
        #searchInput { width: 95%; max-width: 750px; display: block; margin: 20px auto; padding: 15px; border: 2px solid var(--border-color); border-radius: 15px; outline: none; text-align: center; font-size: 17px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        #cards-zone { display: grid; gap: 25px; padding: 10px; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); max-width: 1000px; margin: 0 auto; }
        
        /* التعديلات الجمالية للفريم والظل */
        .card { 
            background: #ffffff; 
            padding: 25px; 
            border-radius: 25px; 
            border: 2px solid var(--border-color); 
            box-shadow: 0 8px 16px rgba(0,0,0,0.15); 
            transition: transform 0.2s;
        }
        
        h3 { color: #333; margin: 0 0 15px 0; font-size: 1.6rem; text-align: center; }
        .label { font-weight: bold; color: #d32f2f; display: block; margin-top: 15px; font-size: 1rem; }
        
        .text-block { 
            white-space: pre-line; 
            color: #555; 
            font-weight: 400; 
            margin-top: 5px; 
            font-size: 0.95rem; 
            line-height: 1.6;
        }
        
        .values-line { font-size: 0.85rem; background: #fff5e6; padding: 12px; border-radius: 15px; margin-top: 20px; color: #e67e22; font-weight: bold; text-align: center; display: flex; justify-content: space-around; border: 1px solid #ffe0b2; }
        .card img { width: 100%; height: auto; max-height: 250px; object-fit: contain; border-radius: 15px; margin-top: 20px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>

    <div id="cards-zone"></div>
