<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد الصيدلية الذكي 💊</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --main-color: #2e7d32; /* أخضر صيدلي */
            --bg-color: #f0f7f4;
            --card-bg: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background: var(--bg-color); color: #333; }
        h2 { text-align: center; color: var(--main-color); }
        
        /* مربع البحث */
        input { width: 100%; max-width: 600px; display: block; margin: 20px auto; padding: 15px; border: 2px solid var(--main-color); border-radius: 25px; font-size: 16px; outline: none; }
        
        /* تنسيق الكروت (Grid) */
        #cards-zone { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid var(--main-color); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        
        h3 { color: var(--main-color); margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        p { margin: 8px 0; white-space: pre-line; line-height: 1.5; }
        .label { font-weight: bold; color: var(--main-color); }
    </style>
</head>
<body>

<h2>البحث في بيانات الصيدلية 💊</h2>
<input type="text" id="searchInput" onkeyup="filterData()" placeholder="🔍 ابحث باسم المرض...">
<div id="cards-zone"></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvlBUTo7Z4iFMHkH0cDGRsba99RlGiFjtGiLsO9MANiIIn_coI7xndvEht7LropZIHXA5SUde0hQo2/pub?output=csv';
    let allData = [];

    Papa.parse(csvUrl, {
        download: true, header: true,
        complete: function(results) {
            allData = results.data;
            displayData(allData);
        }
    });

    function displayData(data) {
        const container = document.getElementById('cards-zone');
        container.innerHTML = '';
        data.forEach(item => {
            if (!item.الاسم) return;
            container.innerHTML += `
                <div class="card">
                    <h3>${item.الاسم}</h3>
                    <p><span class="label">ماهو:</span> ${item.ماهو || '---'}</p>
                    <p><span class="label">السبب:</span> ${item.السبب || '---'}</p>
                    <p><span class="label">التحليل:</span> ${item.التحليل || '---'}</p>
                    <p><span class="label">العلاج:</span> ${item.العلاج || '---'}</p>
                    <p><span class="label">معدي:</span> ${item.معدي || 'لا'}</p>
                    ${item.رابط_الصور ? `<a href="${item.رابط_الصور}" target="_blank" style="color:var(--main-color)">🖼️ عرض الصورة</a>` : ''}
                </div>
            `;
        });
    }

    function filterData() {
        let input = document.getElementById("searchInput").value.toUpperCase();
        let filtered = allData.filter(item => item.الاسم && item.الاسم.toUpperCase().includes(input));
        displayData(filtered);
    }
</script>
</body>
</html>
