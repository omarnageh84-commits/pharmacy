<script>
    function render(data) {
        const container = document.getElementById('cards-zone');
        container.innerHTML = '';
        
        // استخدام كائن لتجميع البيانات تحت نفس اسم المرض
        const groupedData = {};
        data.forEach(item => {
            if (!item.الاسم) return;
            if (!groupedData[item.الاسم]) {
                groupedData[item.الاسم] = item;
            }
        });

        Object.values(groupedData).forEach(item => {
            container.innerHTML += `
                <div class="card">
                    <h3>${item.الاسم}</h3>
                    <p><span class="label">ماهو:</span> ${item.ماهو || '---'}</p>
                    <p><span class="label">التحليل:</span> ${item.التحليل || '---'}</p>
                    <p><span class="label">العلاج:</span> ${item.العلاج || '---'}</p>
                    <p><span class="label">معدي:</span> ${item.معدي || '---'}</p>
                    <p><span class="label">الطبيعي:</span> ${item.الطبيعي || '---'}</p>
                    <p><span class="label">العالي:</span> ${item.العالي || '---'}</p>
                    <p><span class="label">الواطي:</span> ${item.الوطي || '---'}</p>
                    
                    ${item['رابط الصور'] ? `<img src="${item['رابط الصور']}" alt="صورة توضيحية" style="width:100%; border-radius:10px; margin-top:10px;">` : ''}
                </div>
            `;
        });
    }
</script>
