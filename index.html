<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvlBUTo7Z4iFMHkH0cDGRsba99RlGiFjtGiLsO9MANiIIn_coI7xndvEht7LropZIHXA5SUde0hQo2/pub?output=csv';
    let allData = [];

    Papa.parse(csvUrl, {
        download: true, 
        header: true,
        skipEmptyLines: true,
        transformHeader: function(h) { return h.trim(); }, // بيشيل أي مسافات زيادة في أسماء الأعمدة
        complete: function(results) {
            allData = results.data;
            renderData(allData);
        }
    });

    function renderData(data) {
        const container = document.getElementById('cards-zone');
        container.innerHTML = '';
        
        data.forEach(item => {
            if (!item.الاسم) return;

            // دالة بتنضف البيانات وتطلعها بشكل شيك
            const val = (key) => item[key] && item[key].trim() !== "" ? item[key] : '---';

            container.innerHTML += `
                <div class="card">
                    <h3>${item.الاسم}</h3>
                    <p class="card-text"><span class="label">ماهو / سببه:</span><br>${val('ماهو / سببه')}</p>
                    <p class="card-text"><span class="label">التحليل:</span><br>${val('التحليل')}</p>
                    <p class="card-text"><span class="label">العلاج:</span><br>${val('العلاج')}</p>
                    <p class="card-text"><span class="label">معدي:</span> ${val('معدي')}</p>
                    <p class="card-text"><span class="label">الطبيعي:</span> ${val('الطبيعي')}</p>
                    <p class="card-text"><span class="label">العالي:</span> ${val('العالي')}</p>
                    <p class="card-text"><span class="label">الواطي:</span> ${val('الواطي')}</p>
                    ${item['رابط الصور'] ? `<img src="${item['رابط الصور']}" alt="صورة">` : ''}
                </div>
            `;
        });
    }

    function filterData() {
        let val = document.getElementById("searchInput").value.toUpperCase();
        renderData(allData.filter(i => i.الاسم && i.الاسم.toUpperCase().includes(val)));
    }
</script>
