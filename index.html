<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد الصيدلية الذكي 💊</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    
    <link rel="stylesheet" href="main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

<h2>"علم ينتفع به" 💊 - Omar</h2>
<input type="text" id="searchInput" onkeyup="filterData()" placeholder="🔍 ابحث باسم المرض أو الدواء...">
<div id="cards-zone"></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvlBUTo7Z4iFMHkH0cDGRsba99RlGiFjtGiLsO9MANiIIn_coI7xndvEht7LropZIHXA5SUde0hQo2/pub?output=csv&cache=' + new Date().getTime();
    let allData = [];

    Papa.parse(csvUrl, {
        download: true, header: true,
        complete: function(results) {
            allData = results.data;
            renderData(allData);
        }
    });

    function renderData(data) {
        const container = document.getElementById('cards-zone');
        container.innerHTML = '';
        const groups = {};
        const colors = ['#2e7d32', '#1976d2', '#d32f2f', '#f57c00', '#7b1fa2'];

        data.forEach(item => {
            if (!item.الاسم) return;
            if (!groups[item.الاسم]) groups[item.الاسم] = item;
        });

        Object.values(groups).forEach(item => {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            container.innerHTML += `
                <div class="card" style="border-top-color: ${randomColor}">
                    <h3 style="color: ${randomColor}">${item.الاسم}</h3>
                    <p><span class="label">ماهو:</span> ${item.ماهو || '---'}</p>
                    <p><span class="label">السبب:</span> ${item.السبب || '---'}</p>
                    <p><span class="label">التحليل:</span> ${item.التحليل || '---'}</p>
                    <p><span class="label">العلاج:</span> ${item.العلاج || '---'}</p>
                    <p><span class="label">معدي:</span> ${item.العلاج || '---'}</p>
                    <p><span class="label">الطبيعي:</span> ${item.العلاج || '---'}</p>
                    <p><span class="label">العالي:</span> ${item.العلاج || '---'}</p>
                    <p><span class="label">الوطي:</span> ${item.العلاج || '---'}</p>

                    
                    ${item['رابط الصور'] ? `<div class="card-image-container"><img src="${item['رابط الصور']}"></div>` : ''}
                </div>
            `;
        });
    }

    function filterData() {
        let input = document.getElementById("searchInput").value.toUpperCase();
        let filtered = allData.filter(item => item.الاسم && item.الاسم.toUpperCase().includes(input));
        renderData(filtered);
    }
</script>
</body>
</html>
