  </div>

    <div class="bg-[#FFFEFB]/90 backdrop-blur rounded-full border border-[#E2E8F0]/70 p-1 flex items-center gap-1"><span class="text-[9px] text-zinc-500 mr-2 hidden md:block">فلتر:</span><div id="level3" class="flex gap-1 overflow-x-auto no-scrollbar flex-1"></div></div>

<div id="cartDrawer" class="fixed inset-0 z-[60] hidden"><div id="cartBg" class="absolute inset-0 bg-[#13375C]/50"></div><div class="absolute left-0 top-0 bottom-0 w-full max-w-[380px] bg-[#FFFEFB] shadow-2xl flex flex-col"><div class="h-[60px] px-5 flex items-center justify-between border-b border-[#E2E8F0] shrink-0 bg-[#13375C] text-white"><div class="font-black">السلة</div><button id="cartClose" class="w-9 h-9 rounded-full bg-white/10">✕</button></div><div id="cartList" class="flex-1 overflow-auto p-4 space-y-3 bg-[#F2F5F9]"></div><div class="p-4 border-t border-[#E2E8F0] bg-[#FFFEFB] space-y-3"><div class="bg-white rounded-2xl border border-[#E2E8F0] p-3 text-[13px] space-y-2"><div class="flex justify-between"><span class="text-zinc-500">المجموع</span><span id="cSub">0 ج</span></div><div class="flex justify-between"><span class="text-zinc-500">التوصيل</span><span>15 ج</span></div><div class="flex justify-between font-black text-[16px] border-t border-[#E2E8F0] pt-2"><span>الإجمالي</span><span id="cTotal">0 ج</span></div></div><button id="checkoutBtn" class="w-full h-12 rounded-full bg-[#0EB77F] text-white font-black shadow-lg">إتمام الطلب</button></div></div></div>

<div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 hidden bg-[#13375C] text-white px-4 py-2.5 rounded-full text-[13px] z-[80] shadow-xl"></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRfLEsFdxl_lZIRBBwoVI30rAhd4G82kB8Ji4bndsOW48marqrlVon7wY4yBxib94boPXm626ZO44Ts/pub?output=csv";
let SHEET_DATA=[], level1='الكل', level2='الكل', level3='الكل', q='', cart=[], selected=null, tab='details';
const $=s=>document.querySelector(s);

// دالة تحويل الأسعار
const toNum=v=>{if(v==null) return 0; let s=String(v).replace(/[^0-9.]/g,''); return Number(s)||0;};

// دالة تحديد السعر الفعلي
const finalPrice=p=>{
  let d=toNum(p.priceDiscount);
  let c=toNum(p.priceCurrent);
  if(d>0 && d<c) return d;
  return c;
};

// دالة تحديد السعر القديم (للتخفيض)
const oldPrice=p=>{
  let d=toNum(p.priceDiscount);
  let c=toNum(p.priceCurrent);
  if(d>0 && d<c) return c;
  return null;
};

// دالة جلب البدائل (بناءً على المادة الفعالة)
const getAlts=p=>{
  if(p.active && p.active.trim()){
    const a=SHEET_DATA.filter(x=>x.active && x.active.trim().toLowerCase()===p.active.trim().toLowerCase() && x.name!==p.name);
    if(a.length>0) return a;
  }
  return [];
};

function showSub(){$('#subFilters')?.classList.remove('hidden');}
function hideSub(){if(level1==='الكل'&&level2==='الكل'&&level3==='الكل') $('#subFilters')?.classList.add('hidden');}

// تحديث ملخص الفلتر
function updateSummary(){let a=[]; if(level1!=='الكل') a.push(level1); if(level2!=='الكل') a.push(level2); if(level3!=='الكل') a.push(level3); const el=$('#filterSummary'); if(el) el.textContent=a.join(' • ');}

// دالة قراءة الشيت المحدثة (بناءً على ترتيبك)
function parseSheet(csvText){
  let results = Papa.parse(csvText, { header: true, skipEmptyLines: true });
  if(!results.data.length) return [];

  return results.data.map(r => ({
    name: r['الاسم'] || '',
    category: r['القسم'] || '',
    subCategory: 'مسكن', // قيمة افتراضية لـ level2
    active: r['المادة الفعالة'] || '',
    mostSold: r['الاكثر طلبا'] === 'نعم',
    offer: r['عرض'] === 'نعم',
    isNew: r['جديد'] === 'نعم',
    priceCurrent: r['سعر العلبة'],
    priceDiscount: r['السعر بعد العرض'],
    box: r['نوع التجزئة'] || '',
    shortDesc: r['الوصف'] || '',
    image: r['الصورة'] || 'https://via.placeholder.com/200'
  })).filter(r=>r.name); // التأكد من وجود اسم
}

async function loadSheet(){
  const st=$('#statusText'); if(st) st.textContent='⏳ تحميل...';
  try{
    const res=await fetch(CSV_URL+'&t='+Date.now(),{cache:'no-store'});
    const txt=await res.text();
    const parsed=parseSheet(txt);
    if(!parsed.length) throw new Error('empty');
    SHEET_DATA=parsed;
    if(st) st.textContent=`✅ ${SHEET_DATA.length} صنف`;
  }catch(e){
    if(st) st.textContent='⚠️ تجريبي';
    // بيانات تجريبية في حالة فشل التحميل
    SHEET_DATA=[
      {name:"بنادول إكسترا 24 قرص",category:"دواء",subCategory:"مسكن",active:"Paracetamol + Caffeine",mostSold:true,offer:false,isNew:false,priceCurrent:48,priceDiscount:30,box:"علبة 24 قرص",shortDesc:"مسكن سريع وقوي للصداع",image:"
