<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تجربة تشخيص البيانات</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <div id="debug" style="color: red;"></div>
    <div id="results"></div>

<script>
    // تأكد إن الرابط ده هو رابط النشر المباشر (Publish to web -> CSV)
    const csvUrl = 'رابط_الـ_CSV_الخاص_بشيت_جوجل'; 

    Papa.parse(csvUrl, {
        download: true,
        header: true,
        complete: function(results) {
            if (results.errors.length > 0) {
                document.getElementById('debug').innerText = "خطأ في قراءة الملف: " + JSON.stringify(results.errors);
                return;
            }
            
            // لو البيانات وصلت، هنطبعها كـ JSON عشان نشوفها
            document.getElementById('results').innerHTML = "<pre>" + JSON.stringify(results.data, null, 2) + "</pre>";
        }
    });
</script>
</body>
</html>
