<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>علم ينتفع به - Omar 💊</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --main-color: #2e7d32; --bg-color: #f8fdf8; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 10px; background: var(--bg-color); margin: 0; }
        
        #cards-zone { 
            display: grid; 
            gap: 15px; 
            /* موبايل: عمود واحد */
            grid-template-columns: 1fr; 
            max-width: 500px; 
            margin: 0 auto; 
        }

        /* كمبيوتر: اتنين */
        @media (min-width: 768px) {
            #cards-zone { grid-template-columns: repeat(2, 1fr); max-width: 1000px; }
        }

        .card { background: white; padding: 15px; border-radius: 12px; border-top: 6px solid var(--main-color); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; max-height: 100px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
        h3 { color: var(--main-color); margin: 0 0 10px 0; font-size: 1.1rem; }
        p { margin: 4px 0; font-size: 0.9rem; }
        .label { font-weight: bold; color: var(--main-color); }
    </style>
</head>
<body>

    <div id="cards-zone"></div>

<script>
    // كود الجافا سكريبت زي ما هو..
    // ...
</script>
</body>
</html>
