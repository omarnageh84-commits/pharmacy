<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>علم ينتفع به - OMAR 💊</title>
    <style>
        :root { --bg-color: #f0f4f0; --main-color: #2e7d32; --card-bg: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: var(--bg-color); margin: 0; }
        
        #searchInput { width: 95%; max-width: 600px; display: block; margin: 0 auto 30px; padding: 15px; border: 2px solid var(--main-color); border-radius: 30px; outline: none; text-align: center; font-size: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        #cards-zone { 
            display: grid; 
            gap: 25px; 
            /* بيتحكم في عدد الكروت: 350px بيضمن يظهر عدد معين حسب شاشتك */
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        .card { 
            background: var(--card-bg); padding: 25px; border-radius: 25px; 
            border-right: 10px solid var(--main-color); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }
        
        h3 { color: var(--main-color); margin: 0 0 15px 0; font-size: 1.6rem; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px; }
        
        .label { font-weight: bold; color: #333; display: block; margin-top: 15px; font-size: 1rem; border-bottom: 1px dashed #ccc; padding-bottom: 2px; }
        
        /* ده اللي بيخلي العلاج يظهر في سطور منظمة */
        .treatment-item { display: block; margin-top: 5px; color: #555; padding-right: 10px; border-right: 3px solid var(--main-color); margin-bottom: 5px; }
        
        .values-line { font-size: 0.95rem; background: #e8f5e9; padding: 10px; border-radius: 10px; margin-top: 15px; text-align: center; color: #2e7d32; font-weight: bold; }
        
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 15px; margin-top: 20px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

    <input type="text" id="searchInput" onkeyup="filterData()" placeholder="🔍 ابحث عن مرض أو تحليل...">
    <div id="cards-zone"></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvlBUTo7Z4iFMHkH0cDGRsba99RlGiFjtGiLsO9MANiIIn_coI7xndvEht7LropZIHXA5SUde0hQo2/pub?output=csv';
    let allData = [];

    Papa.parse(csvUrl, {
        download: true, header: true,
        complete: function(results) {
            let currentName = "";
            allData = results.data.map(row => {
                if (row.الاسم && row.الاسم.trim() !== "") currentName = row.الاسم;
                return { ...row, الاسم: currentName };
            });
            renderData(allData);
        }
    });

    function renderData(data) {
        const container = document.getElementById('cards-zone');
        container.innerHTML = '';
        const grouped = {};
        data.forEach(row => {
            if (!row.الاسم) return;
            if (!grouped[row.الاسم]) grouped[row.الاسم] = { ...row, العلاج: [] };
            if (row.العلاج && row.العلاج.trim() !== "") grouped[row.الاسم].العلاج.push(row.العلاج);
        });

        Object.values(grouped).forEach(item => {
            // تنسيق العلاج ليظهر كل واحد في سطر
            const treatments = item.العلاج.map(t => `<span class="treatment-item">${t}</span>`).join('');
            
            container.innerHTML += `
                <div class="card">
                    <h3>${item.الاسم}</h3>
                    <span class="label">ماهو / سببه:</span> <p style="margin:5px 0;">${item['ماهو / سببه'] || '---'}</p>
                    <span class="label">التحليل:</span> <p style="margin:5px 0;">${item.التحليل || '---'}</p>
                    <span class="label">العلاج:</span> ${treatments || '---'}
                    <span class="label">معدي:</span> ${item.معدي || '---'}
                    
                    <div class="values-line">
                        طبيعي: ${item.الطبيعي || '-'} | عالي: ${item.العالي || '-'} | واطي: ${item['الواطي'] || '-'}
                    </div>

                    ${item['رابط الصور'] && item['رابط الصور'] !== 'رابط' ? `<img src="${item['رابط الصور']}" alt="صورة">` : ''}
                </div>
            `;
        });
    }

    function filterData() {
        let val = document.getElementById("searchInput").value.toUpperCase();
        renderData(allData.filter(item => JSON.stringify(item).toUpperCase().includes(val)));
    }
</script>
</body>
</html>
