<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQuBQxCesEFgAfM7YACypYmqKNzYsgwM85Bwecxi1UDhbMkEnt-bkcXYYzMHHil3E0G7ihpI4crqNwA/pub?output=csv';

    Papa.parse(csvUrl, {
        download: true, header: true,
        complete: function(results) {
            const container = document.getElementById('cards-zone');
            container.innerHTML = ''; 

            const groupedData = {};

            results.data.forEach(item => {
                if (!item.الاسم) return;
                
                // تجميع البيانات بناءً على الاسم
                if (!groupedData[item.الاسم]) {
                    groupedData[item.الاسم] = { ...item };
                } else {
                    // إضافة العلاج الجديد لنفس المرض بدل كارت جديد
                    groupedData[item.الاسم].العلاج += "، " + item.العلاج;
                }
            });

            // عرض البيانات المجمعة
            Object.values(groupedData).forEach(item => {
                container.innerHTML += `
                    <div class="card">
                        <h3>${item.الاسم}</h3>
                        <p><strong>ماهو:</strong> ${item.ماهو}</p>
                        <p><strong>العلاج:</strong> ${item.العلاج}</p>
                        <p><a href="${item.رابط_الصور}" target="_blank">عرض الصورة</a></p>
                    </div>
                `;
            });
        }
    });
</script>
