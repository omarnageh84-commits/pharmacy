<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>صيدلية د. خالد سالم</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
    *{font-family:'Tajawal',sans-serif}
</style>
</head>
<body class="bg-[#F2F5F9] pb-20">

<header class="bg-[#13375C] p-4 text-white text-center font-black text-xl shadow-lg mb-6">صيدلية د. خالد سالم</header>

<div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 px-4"></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRfLEsFdxl_lZIRBBwoVI30rAhd4G82kB8Ji4bndsOW48marqrlVon7wY4yBxib94boPXm626ZO44Ts/pub?output=csv";

async function loadData() {
    const res = await fetch(CSV_URL);
    const data = await res.text();
    
    Papa.parse(data, {
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            results.data.forEach(item => {
                // التأكد من وجود البيانات
                const name = item['الاسم'];
                if(!name) return;
                
                const price = item['السعر بعد العرض'] && item['السعر بعد العرض'] != 0 ? item['السعر بعد العرض'] : item['سعر العلبة'];
                const img = item['الصورة'] || 'https://via.placeholder.com/150';

                const card = document.createElement('div');
                card.className = "bg-white p-3 rounded-2xl shadow-sm border border-gray-100 flex flex-col";
                card.innerHTML = `
                    <img src="${img}" class="w-full h-32 object-contain mb-3 bg-gray-50 rounded-lg">
                    <h2 class="font-bold text-[13px] mb-2 flex-1">${name}</h2>
                    <p class="text-[#13375C] font-black text-[16px] mb-3">${price} ج.م</p>
                    <button class="w-full bg-[#10B981] text-white py-2 rounded-xl text-[13px] font-bold">طلب</button>
                `;
                grid.appendChild(card);
            });
        }
    });
}
loadData();
</script>
</body>
</html>
