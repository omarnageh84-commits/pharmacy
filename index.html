<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>علم ينتفع به - Omar 💊</title>
    <link rel="icon" href="data:,">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --main-color: #2e7d32; --bg-color: #f8fdf8; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 10px; background: var(--bg-color); margin: 0; }
        
        #searchInput { width: 95%; max-width: 500px; display: block; margin: 15px auto; padding: 12px; border: 2px solid var(--main-color); border-radius: 25px; outline: none; text-align: center; font-size: 16px; }
        
        #cards-zone { 
            display: grid !important; 
            gap: 10px; 
            padding: 5px;
            grid-template-columns: 1fr !important; 
            max-width: 500px; 
            margin: 0 auto; 
        }

        @media (min-width: 768px) {
            #cards-zone { 
                grid-template-columns: repeat(2, 1fr) !important; 
                max-width: 1000px; 
            }
        }

        .card { background: white; padding: 12px; border-radius: 12px; border-top: 6px solid var(--main-color); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .card img { 
            width: 100%; 
            height: auto; 
            max-height: 200px; 
            object-fit: contain; 
            border-radius: 8px; 
            margin-top: 10px; 
        }
        
        h3 { color: var(--main-color); margin: 0 0 10px 0; font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        p { margin: 4px 0; font-size: 0.9rem; line-height: 1.4; color: #333; }
        .label { font-weight: bold; color: var(--main-color); }
    </style>
</head>
<body>

    <input type="text" id="searchInput" onkeyup="filterData()" placeholder="🔍 ابحث باسم المرض...">
    <div id="cards-zone"></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvlBUTo7Z4iFMHkH0cDGRsba99RlGiFjtGiLsO9MANiIIn_coI7xndvEht7LropZIHXA5SUde0hQo2/pub?output=csv';
    let allData = [];

    Papa.parse(csvUrl, {
        download: true, header: true,
        complete: function(results) {
            allData = results.data;
            renderData(allData);
        }
    });

    function renderData(data) {
        const container = document.getElementById('cards-zone');
        container.innerHTML = '';
        const groups = {};

        data.forEach(item => {
            if (!item.الاسم) return;
            if (!groups[item.الاسم]) groups[item.الاسم] = item;
        });

        Object.values(groups).forEach(item => {
            container.innerHTML += `
                <div class="card">
                    <h3>${item.الاسم}</h3>
                    <p class="card-text"><strong>ماهو / سببه:</strong> ${item.ماهو}</p>
                    <p><span class="label">التحليل:</span> ${item.التحليل || '---'}</p>
                    <p><span class="label">العلاج:</span> ${item.العلاج || '---'}</p>
                    <p><span class="label">معدي:</span> ${item.معدي || '---'}</p>
                    <p><span class="label">الطبيعي:</span> ${item.الطبيعي || '---'}</p>
                    <p><span class="label">العالي:</span> ${item.العالي || '---'}</p>
                    <p><span class="label">الواطي:</span> ${item.الوطي || '---'}</p>
                    
                    ${item['رابط الصور'] ? `<img src="${item['رابط الصور']}" alt="صورة المرض">` : ''}
                </div>
            `;
        });
    }

    function filterData() {
        let val = document.getElementById("searchInput").value.toUpperCase();
        renderData(allData.filter(i => i.الاسم && i.الاسم.toUpperCase().includes(val)));
    }
</script>
</body>
</html>
