<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>علم ينتفع به - OMAR 💊</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

    <input type="text" id="searchInput" onkeyup="filterData()" placeholder="🔍 ابحث باسم المرض...">
    <div id="cards-zone"></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvlBUTo7Z4iFMHkH0cDGRsba99RlGiFjtGiLsO9MANiIIn_coI7xndvEht7LropZIHXA5SUde0hQo2/pub?output=csv';
    let allData = [];

    Papa.parse(csvUrl, {
        download: true, header: true,
        complete: function(results) {
            allData = results.data;
            renderData(allData);
        }
    });

    function renderData(data) {
        const container = document.getElementById('cards-zone');
        container.innerHTML = '';
        const groups = {};

        data.forEach(item => {
            if (!item.الاسم) return;
            if (!groups[item.الاسم]) groups[item.الاسم] = item;
        });

        Object.values(groups).forEach(item => {
            container.innerHTML += `
                <div class="card">
                    <h3>${item.الاسم}</h3>
                    <p><span class="label">ماهو / سببه:</span> ${item['ماهو / سببه'] || '---'}</p>
                    <p><span class="label">التحليل:</span> ${item.التحليل || '---'}</p>
                    <p><span class="label">العلاج:</span> ${item.العلاج || '---'}</p>
                    <p><span class="label">معدي:</span> ${item.معدي || '---'}</p>
                    <p><span class="label">الطبيعي:</span> ${item.الطبيعي || '---'}</p>
                    <p><span class="label">العالي:</span> ${item.العالي || '---'}</p>
                    <p><span class="label">الواطي:</span> ${item.الوطي || '---'}</p>
                    
                    ${item['رابط الصور'] ? `<img src="${item['رابط الصور']}" alt="صورة المرض">` : ''}
                </div>
            `;
        });
    }

    function filterData() {
        let val = document.getElementById("searchInput").value.toUpperCase();
        renderData(allData.filter(i => i.الاسم && i.الاسم.toUpperCase().includes(val)));
    }
</script>
</body>
</html>
