<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>علم ينتفع به - Omar 💊</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --main-color: #2e7d32; --bg-color: #f8fdf8; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 10px; background: var(--bg-color); margin: 0; }
        
        #searchInput { width: 95%; max-width: 500px; display: block; margin: 15px auto; padding: 12px; border: 2px solid var(--main-color); border-radius: 25px; outline: none; text-align: center; font-size: 16px; }
        
        /* التنسيق الإجباري للموبايل: كارت واحد */
        #cards-zone { 
            display: grid !important; 
            gap: 15px; 
            padding: 5px;
            grid-template-columns: 1fr !important; 
            max-width: 500px; 
            margin: 0 auto; 
        }

        /* التنسيق الإجباري للكمبيوتر: كارتين */
        @media (min-width: 768px) {
            #cards-zone { 
                grid-template-columns: repeat(2, 1fr) !important; 
                max-width: 1000px; 
            }
        }

        .card { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            border-top: 6px solid var(--main-color); 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            display: flex;
            flex-direction: column;
            text-transform: uppercase; /* يخلي أي حروف إنجليزي كابيتال أوتوماتيك */
        }
        
        h3 { color: var(--main-color); margin: 0 0 10px 0; font-size: 1.2rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        /* تنسيق البيانات في شكل نقط (Bullets) */
        ul.card-data { list-style-type: none; padding: 0; margin: 0; flex-grow: 1; }
        ul.card-data li { margin: 6px 0; font-size: 0.95rem; line-height: 1.5; color: #333; position: relative; padding-right: 15px; }
        ul.card-data li::before { content: "•"; color: var(--main-color); font-weight: bold; position: absolute; right: 0; top: 0; }

        /* تنسيق الصورة: تحت ومتسنترة */
        .card img { 
            max-width: 90%; 
            height: auto; 
            max-height: 150px; 
            object-fit: contain; 
            border-radius: 8px; 
            margin: 15px auto 0 auto; 
            display: block; 
        }
    </style>
</head>
<body>

    <input type="text" id="searchInput" onkeyup="filterData()" placeholder="🔍 ابحث باسم المرض...">
    <div id="cards-zone"></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvlBUTo7Z4iFMHkH0cDGRsba99RlGiFjtGiLsO9MANiIIn_coI7xndvEht7LropZIHXA5SUde0hQo2/pub?output=csv';
    let allData = [];

    Papa.parse(csvUrl, {
        download: true, header: true,
        complete: function(results) {
            allData = results.data;
            renderData(allData);
        }
    });

    function renderData(data) {
        const container = document.getElementById('cards-zone');
        container.innerHTML = '';
        const groups = {};

        data.forEach(item => {
            if (!item.الاسم) return;
            if (!groups[item.الاسم]) groups[item.الاسم] = item;
        });

        Object.values(groups).forEach(item => {
            // تجميع البيانات المتاحة في نقط بدون عناوين
            let listItems = '';
            const fields = ['ماهو', 'التحليل', 'العلاج', 'معدي', 'الطبيعي', 'العالي', 'الوطي'];
            
            fields.forEach(field => {
                if (item[field] && item[field].trim() !== '' && item[field] !== '---') {
                    listItems += `<li>${item[field]}</li>`;
                }
            });

            container.innerHTML += `
                <div class="card">
                    <h3>${item.الاسم}</h3>
                    <ul class="card-data">
                        ${listItems}
                    </ul>
                    
                    ${item['رابط الصور'] ? `<img src="${item['رابط الصور']}" alt="صورة المرض">` : ''}
                </div>
            `;
        });
    }

    function filterData() {
        let val = document.getElementById("searchInput").value.toUpperCase();
        renderData(allData.filter(i => i.الاسم && i.الاسم.toUpperCase().includes(val)));
    }
</script>
</body>
</html>
