<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>علم ينتفع به - Omar 💊</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --main-color: #2e7d32; --bg-color: #f8fdf8; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 10px; background: var(--bg-color); margin: 0; }
        
        #searchInput { width: 95%; max-width: 500px; display: block; margin: 15px auto; padding: 12px; border: 2px solid var(--main-color); border-radius: 25px; outline: none; text-align: center; font-size: 16px; }
        
        #cards-zone { 
            display: grid; 
            gap: 15px; 
            padding: 5px;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            max-width: 1000px; 
            margin: 0 auto; 
        }

        .card { background: white; padding: 15px; border-radius: 12px; border-top: 8px solid var(--main-color); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* ده اللي هيخلي الكلام يظهر مرتب سطور */
        .card-text { 
            white-space: pre-line; 
            line-height: 1.6; 
            font-size: 14px; 
            color: #333; 
            margin: 5px 0;
        }
        
        .label { font-weight: bold; color: var(--main-color); }
        
        .card img { width: 100%; height: auto; max-height: 200px; object-fit: contain; border-radius: 8px; margin-top: 10px; }
        h3 { color: var(--main-color); margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    </style>
</head>
<body>

    <input type="text" id="searchInput" onkeyup="filterData()" placeholder="🔍 ابحث باسم المرض...">
    <div id="cards-zone"></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvlBUTo7Z4iFMHkH0cDGRsba99RlGiFjtGiLsO9MANiIIn_coI7xndvEht7LropZIHXA5SUde0hQo2/pub?output=csv';
    let allData = [];

    Papa.parse(csvUrl, {
        download: true, header: true,
        complete: function(results) {
            allData = results.data;
            renderData(allData);
        }
    });

    function renderData(data) {
        const container = document.getElementById('cards-zone');
        container.innerHTML = '';

        data.forEach(item => {
            if (!item.الاسم) return;
            container.innerHTML += `
                <div class="card">
                    <h3>${item.الاسم}</h3>
                    <p class="card-text"><span class="label">ماهو / سببه:</span><br>${item.ماهو}</p>
                    <p class="card-text"><span class="label">التحليل:</span><br>${item.التحليل || '---'}</p>
                    <p class="card-text"><span class="label">العلاج:</span><br>${item.العلاج || '---'}</p>
                    <p class="card-text"><span class="label">معدي:</span> ${item.معدي || '---'}</p>
                    <p class="card-text"><span class="label">الطبيعي:</span> ${item.الطبيعي || '---'}</p>
                    <p class="card-text"><span class="label">العالي:</span> ${item.العالي || '---'}</p>
                    <p class="card-text"><span class="label">الواطي:</span> ${item.الواطي || '---'}</p>
                    ${item['رابط الصور'] ? `<img src="${item['رابط الصور']}" alt="صورة المرض">` : ''}
                </div>
            `;
        });
    }

    function filterData() {
        let val = document.getElementById("searchInput").value.toUpperCase();
        renderData(allData.filter(i => i.الاسم && i.الاسم.toUpperCase().includes(val)));
    }
</script>
</body>
</html>
