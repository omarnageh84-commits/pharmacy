<style>
    :root { --bg-color: #f8fdf8; --main-color: #2e7d32; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background: var(--bg-color); margin: 0; }
    #searchInput { width: 90%; max-width: 500px; display: block; margin: 20px auto; padding: 12px; border: 2px solid var(--main-color); border-radius: 25px; outline: none; text-align: center; }
    
    #cards-zone { 
        display: grid; 
        gap: 20px; 
        padding: 10px; 
        /* خليتها 350px عشان يظهر مربع أكتر */
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
        max-width: 1200px; 
        margin: 0 auto; 
    }
    
    .card { 
        background: white; 
        padding: 20px; 
        border-radius: 20px; 
        border-top: 8px solid var(--main-color); 
        box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        display: flex;
        flex-direction: column;
    }
    
    h3 { color: var(--main-color); margin: 0 0 15px 0; border-bottom: 2px solid #eee; padding-bottom: 10px; font-size: 1.4rem; }
    .label { font-weight: bold; color: var(--main-color); display: inline; font-size: 1rem; }
    
    /* زودت الـ margin عشان السطور تبعد عن بعض */
    .line { margin-bottom: 12px; font-size: 1rem; line-height: 1.6; }
    
    .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; margin-top: 15px; }
</style>
