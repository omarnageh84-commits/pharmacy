<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>علم ينتفع به - OMAR 💊</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="main.css?v=3.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

    <input type="text" id="searchInput" onkeyup="filterData()" placeholder="🔍 ابحث باسم المرض...">
    <div id="cards-zone"></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvlBUTo7Z4iFMHkH0cDGRsba99RlGiFjtGiLsO9MANiIIn_coI7xndvEht7LropZIHXA5SUde0hQo2/pub?output=csv';
    let allData = [];

    Papa.parse(csvUrl, {
        download: true, 
        header: true,
        skipEmptyLines: true,
        transformHeader: function(h) { return h.trim(); }, // بيشيل أي مسافات مستخبية في أعمدة الإكسيل
        complete: function(results) {
            allData = results.data;
            renderData(allData);
        }
    });

    function renderData(data) {
        const container = document.getElementById('cards-zone');
        container.innerHTML = '';
        const groups = {};

        data.forEach(item => {
            if (!item.الاسم) return;
            if (!groups[item.الاسم]) groups[item.الاسم] = item;
        });

        Object.values(groups).forEach(item => {
            // دالة ذكية بتدور على العمود الحقيقي وبتلغي الـ undefined تماماً
            const getVal = (keys) => {
                const foundKey = keys.find(k => item[k] !== undefined && item[k] !== null && item[k].toString().trim() !== "");
                return foundKey ? item[foundKey] : '---';
            };

            const mahoVal = getVal(['ماهو / سببه', 'ماهو', 'السبب']);
            const watiVal = getVal(['الالواطي', 'الواطي', 'الوطي']);
            const tahlilVal = getVal(['التحليل']);
            const elajVal = getVal(['العلاج']);
            const modyVal = getVal(['معدي']);
            const tabeyiVal = getVal(['الطبيعي']);
            const alyVal = getVal(['العالي']);

            container.innerHTML += `
                <div class="card">
                    <h3>${item.الاسم}</h3>
                    <p class="card-text"><span class="label">ماهو / سببه:</span><br>${mahoVal}</p>
                    <p class="card-text"><span class="label">التحليل:</span><br>${tahlilVal}</p>
                    <p class="card-text"><span class="label">العلاج:</span><br>${elajVal}</p>
                    <p class="card-text"><span class="label">معدي:</span> ${modyVal}</p>
                    <p class="card-text"><span class="label">الطبيعي:</span> ${tabeyiVal}</p>
                    <p class="card-text"><span class="label">العالي:</span> ${alyVal}</p>
                    <p class="card-text"><span class="label">الواطي:</span> ${watiVal}</p>
                    ${item['رابط الصور'] && item['رابط الصور'].trim() !== "" ? `<img src="${item['رابط الصور']}" alt="صورة المرض">` : ''}
                </div>
            `;
        });
    }

    function filterData() {
        let val = document.getElementById("searchInput").value.toUpperCase();
        renderData(allData.filter(i => i.الاسم && i.الاسم.toUpperCase().includes(val)));
    }
</script>
</body>
</html>
