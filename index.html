  <button id="checkoutBtn" class="w-full h-12 rounded-full bg-[#25D366] text-white font-black">📲 إتمام الطلب واتساب</button>
</div></div></div>

<div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 hidden bg-[#13375C] text-white px-4 py-2.5 rounded-full text-[13px] z-[80]"></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRfLEsFdxl_lZIRBBwoVI30rAhd4G82kB8Ji4bndsOW48marqrlVon7wY4yBxib94boPXm626ZO44Ts/pub?output=csv";
const WHATSAPP_NUMBER = "201096084265";
const INSTAPAY_NUM = "01007036085";
const VODAFONE_NUM = "01096084265";
let SHEET_DATA=[], level1='الكل', level2='الكل', level3='الكل', q='', cart=[], selectedPaySingle='كاش عند الاستلام';
const $=s=>document.querySelector(s);
const toNum=v=>{if(v==null||v==='') return 0; return Number(String(v).replace(/[^0-9.,]/g,'').replace(',','.'))||0;};
const cleanText=t=>{ if(!t) return ''; return String(t).replace(/[\r\n]+/g,' ').replace(/\s{2,}/g,' ').trim(); };
function copyNum(num){navigator.clipboard.writeText(num).then(()=>toast('تم نسخ '+num));}

function createPlaceholder(name){
  const short=(name||'منتج').substring(0,18);
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><rect width='100%' height='100%' fill='#fff'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='Tajawal' font-size='16' font-weight='800' fill='#13375C'>${short}</text></svg>`;
  return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
}

function getImageCandidates(urlRaw, productName){
  const placeholder = createPlaceholder(productName);
  if(!urlRaw) return [placeholder];
  let raw = cleanText(urlRaw);
  if(!raw) return [placeholder];
  if(raw.startsWith('data:image')) return [raw];
  if(raw.startsWith('blob:')) return [raw];
  if(raw.length > 150 && /^[A-Za-z0-9+/=\n\r]+$/.test(raw) && !raw.includes(' ') && !raw.includes('.')){
    return [`data:image/jpeg;base64,${raw}`, placeholder];
  }
  if(raw.startsWith('http://') || raw.startsWith('https://')){
    let url = raw;
    if(url.includes('drive.google.com')){
      const m = url.match(/[?&]id=([^&]+)/) || url.match(/\/d\/([^\/]+)/);
      if(m) return [`https://drive.google.com/uc?export=view&id=${m[1]}`, `https://drive.google.com/thumbnail?id=${m[1]}&sz=w500`, url, placeholder];
    }
    if(url.includes('dropbox.com')){
      return [url.replace('?dl=0','?raw=1').replace('&dl=0','&raw=1'), url, placeholder];
    }
    return [url, placeholder];
  }
  let filename = raw.split('/').pop().split('\\').pop().trim().split('?')[0];
  const candidates = [];
  if(raw.includes('/')) candidates.push(raw);
  candidates.push(`./images/${filename}`);
  candidates.push(`images/${filename}`);
  candidates.push(`./${filename}`);
  candidates.push(`/${filename}`);
  if(!/\.(jpg|jpeg|png|webp|gif|svg)$/i.test(filename)){
    candidates.push(`./images/${filename}.jpg`);
    candidates.push(`./images/${filename}.png`);
    candidates.push(`./images/${filename}.webp`);
  }
  candidates.push(placeholder);
  return candidates;
}
function handleImgError(img){
  try{
    const list = JSON.parse(img.dataset.fallback || '[]');
    if(list && list.length){
      const next = list.shift();
      img.dataset.fallback = JSON.stringify(list);
      img.src = next;
    } else {
      img.onerror = null;
      img.src = createPlaceholder(img.alt||'منتج');
    }
  }catch(e){
    img.onerror = null;
    img.src = createPlaceholder(img.alt||'منتج');
  }
}

const finalPrice=p=>{let c=toNum(p.priceCurrent), d=toNum(p.priceDiscount); if(d>0&&d<c) return d; return c;};
const oldPrice=p=>{let c=toNum(p.priceCurrent), d=toNum(p.priceDiscount); if(d>0&&d<c) return c; return null;};
function getSelectedPayment(){const el=document.querySelector('input[name="paymentMethod"]:checked'); return el?el.value:'كاش عند الاستلام';}

function orderSingleProductWhatsApp(product){
  const fp=finalPrice(product); const op=oldPrice(product);
  const message=`السلام عليكم صيدلية د. خالد سالم 👋\nعايز اطلب المنتج ده:\n📦 *${product.name}*\n💰 ${op?`كان ${op} وبقى ${fp}`:`${fp}`} جنيه\n💳 الدفع: ${selectedPaySingle}\nممكن تأكيد التوفر والتوصيل؟`;
  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
}
function orderCartWhatsApp(){
  if(!cart.length){ toast('السلة فاضية'); return; }
  const payment=getSelectedPayment(); let message=`السلام عليكم صيدلية د. خالد سالم 👋\nعايز اطلب:\n\n`; let total=0;
  cart.forEach((it,idx)=>{ const pr=finalPrice(it); total+=pr*it.qty; message+=`${idx+1}. *${it.name}* - ${pr}×${it.qty}=${pr*it.qty}ج\n`; });
  message+=`\nالإجمالي + شحن: ${total+15}ج\nالدفع: ${payment}`;
  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
}

function parseSheet(csvText){
  let rows=Papa.parse(csvText,{header:false,skipEmptyLines:false}).data;
  rows=rows.filter(r=>r.join('').trim()!==''); if(!rows.length) return [];
  const header=rows[0].map(h=>cleanText(h)); rows=rows.slice(1);
  const idx={
    name:header.findIndex(h=>h.includes('الاسم')),
    mainCat:header.findIndex(h=>h.includes('التصنيف')),
    subCat:header.findIndex(h=>h==='القسم'||(h.includes('القسم')&&!h.includes('التصنيف'))),
    priceCurrent:header.findIndex(h=>h.includes('سعر العلبة')),
    priceDiscount:header.findIndex(h=>h.includes('بعد العرض')),
    active:header.findIndex(h=>h.includes('المادة الفعالة')),
    image:header.findIndex(h=>h.includes('الصورة')),
    shortDesc:header.findIndex(h=>h.includes('الوصف')),
    available:header.findIndex(h=>h.includes('متوفر')),
    isNew:header.findIndex(h=>h.includes('جديد')),
    offer:header.findIndex(h=>h==='عرض'||h.startsWith('عرض ')),
    mostSold:header.findIndex(h=>h.includes('الاكثر')||h.includes('الأكثر')),
    keywords:header.findIndex(h=>h.includes('الكلمات')||h.includes('مفتاحية')),
  };
  const out=[]; let buffer=null;
  rows.forEach(raw=>{
    if(raw.length<5){ if(buffer) buffer[idx.shortDesc>=0?idx.shortDesc:9]=(buffer[idx.shortDesc>=0?idx.shortDesc:9]||'')+' '+raw.join(' '); return; }
    if(buffer){ const pr=processRow(buffer); if(pr) out.push(pr); }
    buffer=raw;
  });
  if(buffer){ const pr=processRow(buffer); if(pr) out.push(pr); }
  function getVal(r,i){ if(i<0||i>=r.length) return ''; return cleanText(r[i]); }
  function processRow(r){
    let name=getVal(r,idx.name); if(!name) return null;
    let mainCat=idx.mainCat>=0?getVal(r,idx.mainCat):'عام';
    let subCat=idx.subCat>=0?getVal(r,idx.subCat):mainCat;
    let priceCurrent=idx.priceCurrent>=0?getVal(r,idx.priceCurrent):'';
    let priceDiscount=idx.priceDiscount>=0?getVal(r,idx.priceDiscount):'';
    let active=idx.active>=0?getVal(r,idx.active):'';
    let imageRaw=idx.image>=0?getVal(r,idx.image):'';
    let shortDesc=idx.shortDesc>=0?getVal(r,idx.shortDesc):'';
    let available=idx.available>=0?getVal(r,idx.available):'نعم';
    let isNew=idx.isNew>=0?getVal(r,idx.isNew)==='نعم':false;
    let offer=idx.offer>=0?getVal(r,idx.offer)==='نعم':false;
    let mostSold=idx.mostSold>=0?getVal(r,idx.mostSold)==='نعم':false;
    let keywords=idx.keywords>=0?getVal(r,idx.keywords):'';
    return {name,category:mainCat||'عام',subCategory:subCat||mainCat||'عام',priceCurrent,priceDiscount,active,shortDesc,keywords,imageRaw,available:available!=='لا',isNew,offer,mostSold};
  }
  return out.filter(Boolean);
}

async function loadSheet(){
  const st=$('#statusText'); st.textContent='⏳ تحميل...';
  try{
    const res=await fetch(CSV_URL+'&t='+Date.now(),{cache:'no-store'});
    const txt=await res.text();
    SHEET_DATA=parseSheet(txt);
    st.textContent=`✅ ${SHEET_DATA.length} صنف - يقبل أي صورة`;
  }catch(e){st.textContent='⚠ خطأ';}
  initFilters(); renderGrid(); upd();
}
function initFilters(){
  const mainCats=['الكل',...new Set(SHEET_DATA.map(r=>r.category).filter(Boolean))];
  const l1=$('#level1'); l1.innerHTML='';
  mainCats.forEach(n=>{
    const b=document.createElement('button');
    b.textContent=n;
    b.className=`shrink-0 h-[26px] px-3 rounded-full text-[11px] font-bold border ${level1===n?'bg-[#0EB77F] text-white border-[#0EB77F]':'bg-white text-zinc-600'}`;
    b.onclick=()=>{level1=n; level2='الكل'; level3='الكل'; initFilters(); renderGrid(); updateSummary();};
    l1.appendChild(b);
  });
  let subs=SHEET_DATA; if(level1!=='الكل') subs=subs.filter(r=>r.category===level1);
  const subCats=['الكل',...new Set(subs.map(r=>r.subCategory).filter(Boolean))];
  const l2=$('#level2'); l2.innerHTML='';
  subCats.forEach(n=>{
    const b=document.createElement('button');
    b.textContent=n;
    b.className=`shrink-0 h-[22px] px-2.5 rounded-full text-[10px] border ${level2===n?'bg-[#13375C] text-white':'bg-white text-zinc-600'}`;
    b.onclick=()=>{level2=n; renderGrid(); updateSummary();};
    l2.appendChild(b);
  });
  const l3=$('#level3'); l3.innerHTML='';
  [{id:'الكل',label:'الكل'},{id:'عروض',label:'عروض'},{id:'الأكثر طلبا',label:'🔥 الأكثر طلبا'}].forEach(t=>{
    const b=document.createElement('button');
    b.textContent=t.label;
    b.className=`shrink-0 h-[22px] px-2.5 rounded-full text-[10px] border ${level3===t.id?'bg-[#0EB77F] text-white':'bg-white text-zinc-600'}`;
    b.onclick=()=>{level3=t.id; renderGrid(); updateSummary();};
    l3.appendChild(b);
  });
}
function updateSummary(){let a=[]; if(level1!=='الكل') a.push(level1); if(level2!=='الكل') a.push(level2); if(level3!=='الكل') a.push(level3); $('#filterSummary').textContent=a.join(' • ');}
function filtered(){
  return SHEET_DATA.filter(r=>{
    const ok1=level1==='الكل'||r.category===level1;
    const ok2=level2==='الكل'||r.subCategory===level2;
    let ok3=true; if(level3==='عروض') ok3=r.offer; if(level3==='الأكثر طلبا') ok3=r.mostSold;
    const qq=q.toLowerCase(); const okQ=!q||r.name.toLowerCase().includes(qq)||r.active.toLowerCase().includes(qq)||r.keywords.toLowerCase().includes(qq);
    return ok1&&ok2&&ok3&&okQ;
  });
}
function renderGrid(){
  const list=filtered();
  const g=$('#grid'); g.innerHTML='';
  if(!list.length){$('#empty').classList.remove('hidden'); return;}
  $('#empty').classList.add('hidden');
  list.forEach(r=>{
    const fp=finalPrice(r); const op=oldPrice(r); const disc=op?Math.round((1-fp/op)*100):0;
    const candidates = getImageCandidates(r.imageRaw, r.name);
    const firstImg = candidates[0];
    const fallback = JSON.stringify(candidates.slice(1));
    const div=document.createElement('div');
    div.className='card bg-white rounded-[16px] border border-[#E2E8F0] flex flex-col min-h-[400px] cursor-pointer shadow-sm hover:shadow-lg transition overflow-hidden';
    div.innerHTML=`
      <div class="card-img-wrap h-[210px] md:h-[230px] w-full bg-white p-3 relative">
        ${disc>0?`<span class="absolute top-2 left-2 bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full z-10">خصم ${disc}%</span>`:''}
        <span class="absolute top-2 right-2 ${r.available?'bg-[#0EB77F]':'bg-red-500'} text-white text-[9px] font-bold px-2 py-0.5 rounded-full z-10">${r.available?'متوفر':'غير متوفر'}</span>
        <img src="${firstImg}" alt="${r.name}" loading="lazy" referrerpolicy="no-referrer" class="card-img" data-fallback='${fallback}' onerror="handleImgError(this)">
      </div>
      <div class="p-3 flex-1 flex flex-col bg-[#FFFEFB]">
        <div class="font-bold text-[12px] line-clamp-2 text-center flex-1 leading-5">${r.name}</div>
        <div class="text-[10px] text-zinc-400 text-center mt-1">${r.category} • ${r.subCategory}</div>
        <div class="mt-3 bg-[#F8FAFC] rounded-xl p-2 text-center border">
          ${op?`<div class="flex items-center justify-center gap-2"><span class="text-[11px] text-zinc-400 line-through">${op}</span><span class="text-[13px] font-black text-[#0EB77F]">${fp} جنيه</span></div><div class="text-[10px] text-red-500">وفر ${op-fp} ج</div>`:`<div class="text-[13px] font-black text-[#13375C]">${fp} جنيه</div>`}
        </div>
        <button class="btn-order mt-3 w-full h-[40px] rounded-[10px] bg-[#25D366] text-white text-[12px] font-black">📲 طلب واتساب</button>
        <button class="btn-cart mt-2 w-full h-[32px] rounded-[8px] bg-[#F2F5F9] text-[11px] font-bold text-zinc-600">+ أضف للسلة</button>
      </div>`;
    div.querySelector('.btn-order').onclick=e=>{e.stopPropagation(); openM(r);};
    div.querySelector('.btn-cart').onclick=e=>{e.stopPropagation(); addCart(r);};
    div.onclick=()=>openM(r);
    g.appendChild(div);
  });
}

function openM(r){
  const fp=finalPrice(r); const op=oldPrice(r); const disc=op?Math.round((1-fp/op)*100):0;
  selectedPaySingle='كاش عند الاستلام';
  const candidates = getImageCandidates(r.imageRaw, r.name);
  const firstImg = candidates[0];
  const fallback = JSON.stringify(candidates.slice(1));
  const mBody=$('#mBody');
  mBody.innerHTML=`
    <div class="grid md:grid-cols-[1.1fr_0.9fr] md:h-[520px]">
      <div class="bg-white flex items-center justify-center p-6 md:p-8 relative h-[320px] md:h-full border-b md:border-b-0 md:border-l border-[#F1F5F9]">
        ${disc>0?`<span class="absolute top-4 left-4 bg-[#EF4444] text-white text-[11px] font-black px-3 py-1 rounded-full shadow">خصم ${disc}%</span>`:''}
        <span class="absolute top-4 right-4 ${r.available?'bg-[#0EB77F]':'bg-[#EF4444]'} text-white text-[10px] font-bold px-3 py-1 rounded-full shadow">${r.available?'✓ متوفر':'غير متوفر'}</span>
        <img src="${firstImg}" alt="${r.name}" class="max-w-full max-h-full object-contain" referrerpolicy="no-referrer" data-fallback='${fallback}' onerror="handleImgError(this)">
      </div>
      <div class="p-5 md:p-6 flex flex-col">
        <div class="flex-1">
          <div class="text-[10px] text-[#64748B] font-bold tracking-wide">${r.category} • ${r.subCategory}</div>
          <h2 class="font-black text-[15px] leading-6 text-[#0F172A] mt-1 line-clamp-2">${r.name}</h2>
          ${r.active?`<div class="text-[11px] text-[#475569] mt-2"><span class="text-[#94A3B8]">المادة الفعالة:</span> ${r.active}</div>`:''}
          <div class="mt-4 bg-[#F8FAFC] border border-[#F1F5F9] rounded-[14px] p-3">
            <div class="flex items-baseline gap-2">
              <span class="text-[24px] font-black text-[#13375C]">${fp} <span class="text-[12px] font-bold">جنيه</span></span>
              ${op?`<span class="text-[12px] text-[#94A3B8] line-through">${op} ج</span>`:''}
            </div>
            ${op?`<div class="text-[11px] text-[#16A34A] font-bold mt-1">وفر ${op-fp} جنيه • بدل ${op}</div>`:''}
          </div>
          ${r.shortDesc?`<div class="mt-4 text-[12px] leading-6 text-[#334155] bg-[#FFFBEB] border border-[#FEF3C7] rounded-xl p-3 line-clamp-3">${r.shortDesc}</div>`:''}
        </div>
        <div class="mt-5">
          <div class="text-[11px] font-black text-[#0F172A] mb-2">💳 طريقة الدفع:</div>
          <div class="grid grid-cols-3 gap-2">
            <div class="pay-pill active" data-pay="كاش عند الاستلام" onclick="selectPaySingle(this)"><div>💵</div><div>كاش</div><small class="text-[9px] text-zinc-500">عند الاستلام</small></div>
            <div class="pay-pill" data-pay="انستا باي - 01007036085" onclick="selectPaySingle(this)"><div>💸</div><div>انستا باي</div><small class="text-[9px] text-zinc-500">${INSTAPAY_NUM}</small></div>
            <div class="pay-pill" data-pay="فودافون كاش - 01096084265" onclick="selectPaySingle(this)"><div>📱</div><div>فودافون</div><small class="text-[9px] text-zinc-500">${VODAFONE_NUM}</small></div>
          </div>
        </div>
        <div class="mt-4 grid grid-cols-1 gap-2">
          <button id="mOrderWA" class="w-full h-[46px] rounded-full bg-[#25D366] hover:bg-[#1DA851] text-white font-black text-[13px] shadow-[0_4px_14px_rgba(37,211,102,0.35)] transition">📲 اطلب واتساب الآن - ${fp} ج</button>
          <button id="mAddCart" class="w-full h-[42px] rounded-full bg-[#13375C] hover:bg-[#0f2a47] text-white font-bold text-[12px]">+ أضف للسلة</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('mOrderWA').onclick=()=>{ orderSingleProductWhatsApp(r); document.getElementById('modal').classList.add('hidden'); };
  document.getElementById('mAddCart').onclick=()=>{ addCart(r); document.getElementById('modal').classList.add('hidden'); };
  document.getElementById('modal').classList.remove('hidden');
}

function selectPaySingle(el){
  document.querySelectorAll('.pay-pill').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  selectedPaySingle = el.dataset.pay;
}

function addCart(r){const f=cart.find(x=>x.name===r.name); if(f) f.qty++; else cart.push({...r,qty:1}); upd(); toast('تمت الإضافة للسلة');}
function upd(){
  let c=0,s=0; cart.forEach(i=>{c+=i.qty; s+=finalPrice(i)*i.qty;});
  $('#cartCount').textContent=c; $('#cSub').textContent=s+' ج'; $('#cTotal').textContent=(s+15)+' ج';
  const l=$('#cartList'); l.innerHTML='';
  if(!cart.length) l.innerHTML='<div class="py-16 text-center text-[12px] text-zinc-500">السلة فاضية</div>';
  else cart.forEach((it,idx)=>{
    const cands = getImageCandidates(it.imageRaw||it.name, it.name);
    const d=document.createElement('div'); d.className='flex gap-2 p-3 border rounded-xl bg-white';
    d.innerHTML=`<img src="${cands[0]}" class="w-12 h-12 object-contain rounded border" data-fallback='${JSON.stringify(cands.slice(1))}' onerror="handleImgError(this)"><div class="flex-1"><div class="text-[12px] font-bold line-clamp-1">${it.name}</div><div class="text-[10px]">${finalPrice(it)}×${it.qty}=${finalPrice(it)*it.qty}ج</div></div><button class="text-[11px] text-red-500 font-bold">حذف</button>`;
    d.querySelector('button').onclick=()=>{cart.splice(idx,1); upd();}; l.appendChild(d);
  });
}
function toast(t){const e=$('#toast'); e.textContent=t; e.classList.remove('hidden'); setTimeout(()=>e.classList.add('hidden'),2200);}
$('#searchDesktop').oninput=e=>{q=e.target.value; renderGrid();};
$('#searchMobile').oninput=e=>{q=e.target.value; renderGrid();};
$('#cartBtn').onclick=()=>$('#cartDrawer').classList.remove('hidden');
$('#cartClose').onclick=$('#cartBg').onclick=()=>$('#cartDrawer').classList.add('hidden');
$('#mClose').onclick=$('#modalBg').onclick=()=>$('#modal').classList.add('hidden');
$('#checkoutBtn').onclick=()=>{ orderCartWhatsApp(); };
$('#clearFilters').onclick=()=>{level1='الكل';level2='الكل';level3='الكل';q='';$('#searchDesktop').value='';$('#searchMobile').value='';initFilters();renderGrid();updateSummary();};
loadSheet();
</script>
</body>
